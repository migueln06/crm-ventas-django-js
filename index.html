<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Ventas - Mi Portafolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Gestión de Prospectos</h1>
        
        <button id="btnCargar" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">
            Actualizar Lista
        </button>

        <div class="mt-8 bg-white shadow-md rounded-lg overflow-hidden">
            <div class="bg-white p-6 rounded-lg shadow-md mb-8">
    <h2 class="text-xl font-semibold mb-4 text-gray-700">Registrar Nuevo Prospecto</h2>
    <form id="formProspecto" class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <input type="text" id="nombre" placeholder="Nombre completo" required 
               class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
        
        <select id="origen" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="WB">Web</option>
            <option value="IG">Instagram</option>
            <option value="TK">TikTok</option>
            <option value="RE">Referido</option>
        </select>

        <select id="estado" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="NUEVO">Nuevo</option>
            <option value="CONTACTADO">Contactado</option>
            <option value="CALIFICADO">Calificado</option>
        </select>

        <button type="submit" class="bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700 transition">
            Guardar Prospecto
        </button>
    </form>
</div>
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-200">
                    <tr>
                        <th class="p-4 font-semibold text-gray-700">Nombre</th>
                        <th class="p-4 font-semibold text-gray-700">Origen</th>
                        <th class="p-4 font-semibold text-gray-700">Estado</th>
                    </tr>
                </thead>
                <tbody id="lista-prospectos">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btnCargar');
        const tabla = document.getElementById('lista-prospectos');

        const form = document.getElementById('formProspecto');

form.addEventListener('submit', async (e) => {
    e.preventDefault(); // Evita que la página se recargue

    // Recopilamos los datos de los inputs
    const nuevoProspecto = {
        nombre: document.getElementById('nombre').value,
        origen: document.getElementById('origen').value,
        estado: document.getElementById('estado').value
    };

    try {
        // ENVIAMOS LOS DATOS A LA API (Método POST)
        const respuesta = await fetch('http://127.0.0.1:8000/api/prospectos/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(nuevoProspecto)
        });

        if (respuesta.ok) {
            alert("¡Prospecto guardado con éxito!");
            form.reset(); // Limpia el formulario
            btn.click();  // Simula un clic en "Actualizar Lista" para ver el nuevo dato
        } else {
            alert("Hubo un error al guardar.");
        }
    } catch (error) {
        console.error("Error en el envío:", error);
    }
});

        btn.addEventListener('click', async () => {
            try {
                // LLAMADA A TU API
                const respuesta = await fetch('http://127.0.0.1:8000/api/prospectos/');
                const datos = await respuesta.json();

                // Limpiar tabla
                tabla.innerHTML = '';

                // Insertar filas
                datos.forEach(prospecto => {
    tabla.innerHTML += `
        <tr class="border-t hover:bg-gray-50">
            <td class="p-4">${prospecto.nombre}</td>
            <td class="p-4 text-sm text-blue-600 font-medium">${prospecto.origen}</td>
            <td class="p-4">
                <span class="px-2 py-1 bg-green-100 text-green-800 text-xs rounded-full">
                    ${prospecto.estado}
                </span>
            </td>
            <td class="p-4">
                <button onclick="eliminarProspecto(${prospecto.id})" 
                        class="text-red-600 hover:text-red-800 font-medium text-sm">
                    Eliminar
                </button>
            </td>
        </tr>
    `;
});
            } catch (error) {
                console.error("Error al conectar con la API:", error);
                alert("No se pudo conectar con el servidor. ¿Está corriendo Django?");
            }
        });

        async function eliminarProspecto(id) {
    if (!confirm('¿Estás seguro de que quieres eliminar este prospecto?')) return;

    try {
        const respuesta = await fetch(`http://127.0.0.1:8000/api/prospectos/${id}/`, {
            method: 'DELETE',
        });

        if (respuesta.ok) {
            alert("Eliminado correctamente");
            // Llamamos a la función que actualiza la tabla (el clic del botón)
            document.getElementById('btnCargar').click();
        } else {
            alert("Error al eliminar");
        }
    } catch (error) {
        console.error("Error:", error);
    }
}
    </script>
</body>
</html>
